<html lang="ko"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>바이럴 레이더</title>
  <link rel="preconnect" href="https://fonts.googleapis.com/">
  <link href="./index_files/css2" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F8F6F1;
      --bg2: #FFFFFF;
      --bg3: #F0EDE6;
      --border: rgba(0,0,0,0.08);
      --border2: rgba(0,0,0,0.15);
      --text: #1a1a1a;
      --muted: #888880;
      --accent: #E24B4A;
      --teal: #0F9B7A;
      --amber: #D97706;
      --purple: #6D4ADB;
      --meitu: #E24B4A;
      --beautycam: #6D4ADB;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 14px; min-height: 100vh; }
    .shell { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

    header { border-bottom: 0.5px solid var(--border); background: rgba(248,246,241,0.95); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; }
    .hdr { display: flex; align-items: center; justify-content: space-between; height: 58px; }
    .logo { display: flex; align-items: center; gap: 9px; }
    .logo-mark { width: 30px; height: 30px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
    .logo-txt { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; color: var(--text); }
    .logo-txt span { color: var(--accent); }
    .hdr-right { display: flex; align-items: center; gap: 12px; }
    .live-badge { display: flex; align-items: center; gap: 5px; background: rgba(15,155,122,0.1); border: 0.5px solid rgba(15,155,122,0.3); border-radius: 20px; padding: 4px 10px; font-size: 11px; color: var(--teal); font-weight: 500; }
    .live-dot { width: 5px; height: 5px; background: var(--teal); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }
    .hdr-meta { font-size: 11px; color: var(--muted); }
    .refresh-btn { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 8px; color: var(--text); padding: 6px 13px; cursor: pointer; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; }

    /* 상단 스탯 — 병렬 배치 */
    .stats-row { display: flex; align-items: center; gap: 10px; padding: 18px 0 0; flex-wrap: wrap; }
    .stat-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; flex: 1; min-width: 160px; }
    .stat-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .stat-body {}
    .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; line-height: 1; color: var(--text); }
    .stat-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .stat-card.viral .stat-icon { background: rgba(226,75,74,0.1); }
    .stat-card.viral .stat-value { color: var(--accent); }
    .stat-card.tracking .stat-icon { background: rgba(217,119,6,0.1); }
    .stat-card.meitu .stat-icon { background: rgba(226,75,74,0.1); }
    .stat-card.meitu .stat-value { color: var(--meitu); }
    .stat-card.bcam .stat-icon { background: rgba(109,74,219,0.1); }
    .stat-card.bcam .stat-value { color: var(--beautycam); }
    .stat-card.cost .stat-icon { background: rgba(15,155,122,0.1); }
    .stat-card.cost .stat-value { color: var(--teal); font-size: 18px; }

    /* 필터바 */
    .filter-bar { display: flex; align-items: center; gap: 8px; padding: 16px 0 14px; flex-wrap: wrap; }
    .chip { padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--border2); background: var(--bg2); color: var(--muted); font-size: 12px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all .15s; }
    .chip:hover { border-color: var(--text); color: var(--text); }
    .chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }
    .chip.on-b { background: var(--beautycam); border-color: var(--beautycam); color: #fff; }
    .chip.on-v { background: var(--amber); border-color: var(--amber); color: #fff; }
    .sort-sel { margin-left: auto; background: var(--bg2); border: 0.5px solid var(--border2); border-radius: 8px; color: var(--text); padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }

    /* 메인 그리드 */
    .content-grid { display: grid; grid-template-columns: 1fr 300px; gap: 20px; padding-bottom: 40px; }
    .feed { display: flex; flex-direction: column; gap: 8px; }

    /* 릴스 카드 */
    .rcard { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px 16px; display: grid; grid-template-columns: 66px 1fr 68px; gap: 14px; align-items: start; text-decoration: none; color: inherit; transition: border-color .15s; cursor: pointer; }
    .rcard:hover { border-color: var(--border2); }
    .rcard.viral { border-color: rgba(226,75,74,0.35); background: rgba(226,75,74,0.03); }
    .thumb { width: 66px; height: 66px; border-radius: 8px; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; overflow: hidden; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .rbody {}
    .rhead { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; }
    .bbadge { padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 700; }
    .bbadge.meitu { background: rgba(226,75,74,0.12); color: #B83332; }
    .bbadge.beautycam { background: rgba(109,74,219,0.12); color: #5039A8; }
    .vtag { padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 700; background: rgba(217,119,6,0.12); color: var(--amber); border: 0.5px solid rgba(217,119,6,0.3); }
    .tracking-tag { padding: 2px 7px; border-radius: 10px; font-size: 10px; background: var(--bg3); color: var(--muted); }
    .rtime { margin-left: auto; font-size: 11px; color: var(--muted); }
    .rcap { font-size: 12px; color: var(--text); line-height: 1.5; margin-bottom: 7px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .rmets { display: flex; gap: 12px; flex-wrap: wrap; }
    .met { font-size: 11px; color: var(--muted); }
    .met b { color: var(--text); font-weight: 500; }
    .gpill { display: inline-block; padding: 2px 7px; border-radius: 8px; font-size: 11px; font-weight: 700; }
    .gpill.hot { background: rgba(226,75,74,0.1); color: var(--accent); }
    .gpill.warm { background: rgba(217,119,6,0.1); color: var(--amber); }
    .gpill.cool { background: rgba(15,155,122,0.1); color: var(--teal); }

    /* 스코어 링 */
    .scol { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .sring { position: relative; width: 54px; height: 54px; }
    .sring svg { transform: rotate(-90deg); }
    .sring-val { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.1; }
    .sring-num { font-size: 11px; font-weight: 700; }
    .sring-lbl { font-size: 9px; color: var(--muted); }
    .sdots { display: flex; gap: 3px; margin-top: 3px; }
    .sdot { width: 5px; height: 5px; border-radius: 50%; background: var(--bg3); }
    .sdot.done { background: var(--teal); }
    .sdot.active { background: var(--amber); }

    /* 사이드바 */
    .sidebar { display: flex; flex-direction: column; gap: 12px; }
    .sc { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px 16px; }
    .sc-title { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 12px; }
    .alert-item { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; border-bottom: 0.5px solid var(--border); }
    .alert-item:last-child { border-bottom: none; padding-bottom: 0; }
    .adot { width: 7px; height: 7px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .abrand { font-size: 11px; font-weight: 700; margin-bottom: 2px; }
    .agrowth { font-size: 18px; font-weight: 700; font-family: 'Syne', sans-serif; line-height: 1; }
    .atime { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .log-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 0.5px solid var(--border); font-size: 12px; }
    .log-row:last-child { border-bottom: none; }
    .ldot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    .ldot.success { background: var(--teal); }
    .ldot.error { background: var(--accent); }
    .guide-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); padding: 3px 0; }
    .guide-row span:last-child { color: var(--text); font-weight: 500; }

    .empty-state { padding: 60px 20px; text-align: center; color: var(--muted); }
    .loading-skeleton { background: linear-gradient(90deg, var(--bg3) 25%, var(--bg) 50%, var(--bg3) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
    @keyframes shimmer { to { background-position: -200% 0; } }

    @media (max-width: 900px) {
      .content-grid { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .stats-row { gap: 8px; }
      .stat-card { min-width: 140px; }
    }
  </style>
</head>
<body>

<header>
  <div class="shell">
    <div class="hdr">
      <div class="logo">
        <div class="logo-mark">📡</div>
        <div class="logo-txt">바이럴 <span>레이더</span></div>
      </div>
      <div class="hdr-right">
        <div class="live-badge"><span class="live-dot"></span>실시간 추적 중</div>
        <span class="hdr-meta" id="last-update">—</span>
        <button class="refresh-btn" onclick="loadData()">새로고침</button>
      </div>
    </div>
  </div>
</header>

<main class="shell">
  <div class="stats-row">
    <div class="stat-card viral">
      <div class="stat-icon">🔥</div>
      <div class="stat-body">
        <div class="stat-label">급상승 감지</div>
        <div class="stat-value" id="stat-viral">—</div>
        <div class="stat-sub">바이럴 판정 릴스</div>
      </div>
    </div>
    <div class="stat-card tracking">
      <div class="stat-icon">📡</div>
      <div class="stat-body">
        <div class="stat-label">추적 중</div>
        <div class="stat-value" id="stat-tracking">—</div>
        <div class="stat-sub">재측정 대기</div>
      </div>
    </div>
    <div class="stat-card meitu">
      <div class="stat-icon">🇨🇳</div>
      <div class="stat-body">
        <div class="stat-label">메이투</div>
        <div class="stat-value" id="stat-meitu">—</div>
        <div class="stat-sub">수집 릴스</div>
      </div>
    </div>
    <div class="stat-card bcam">
      <div class="stat-icon">📷</div>
      <div class="stat-body">
        <div class="stat-label">뷰티캠</div>
        <div class="stat-value" id="stat-bcam">—</div>
        <div class="stat-sub">수집 릴스</div>
      </div>
    </div>
    <div class="stat-card cost">
      <div class="stat-icon">💰</div>
      <div class="stat-body">
        <div class="stat-label">이번 달 Apify</div>
        <div class="stat-value" id="stat-cost">$0.00</div>
        <div class="stat-sub" id="stat-runs">실행 0회</div>
      </div>
    </div>
  </div>

  <div class="filter-bar">
    <button class="chip on" onclick="setFilter(&#39;all&#39;,this)">전체</button>
    <button class="chip" onclick="setFilter(&#39;meitu&#39;,this)">메이투</button>
    <button class="chip" onclick="setFilter(&#39;beautycam&#39;,this)">뷰티캠</button>
    <button class="chip" id="viral-chip" onclick="toggleViral(this)">🔥 급상승만</button>
    <select class="sort-sel" onchange="setSort(this.value)">
      <option value="first_seen_at">최신순</option>
      <option value="growth">증가율순</option>
      <option value="views">조회수순</option>
    </select>
  </div>

  <div class="content-grid">
    <div class="feed" id="feed"><div class="empty-state"><div style="font-size:36px;margin-bottom:12px">⚠️</div><div>데이터 로드 실패</div><div style="font-size:12px;margin-top:8px;color:var(--muted)">Failed to fetch</div></div></div>
    <aside class="sidebar">
      <div class="sc">
        <div class="sc-title">🔔 최근 급상승 알림</div>
        <div id="alerts-list"><div style="font-size:12px;color:var(--muted)">알림 없음</div></div>
      </div>
      <div class="sc">
        <div class="sc-title">📋 크롤링 로그</div>
        <div id="crawl-log"><div style="font-size:12px;color:var(--muted)">로그 없음</div></div>
      </div>
      <div class="sc">
        <div class="sc-title">📊 바이럴 판정 기준</div>
        <div style="font-size:12px;line-height:1.9;color:var(--muted)">
          <div class="guide-row"><span>6h 이내</span><span>+200% 이상 (최소 1,000뷰)</span></div>
          <div class="guide-row"><span>12h 이내</span><span>+200% 이상 (최소 3,000뷰)</span></div>
          <div class="guide-row"><span>24h 이내</span><span>+300% 이상 (최소 7,000뷰)</span></div>
        </div>
      </div>
    </aside>
  </div>
</main>

<script>
// ★ 본인 값으로 교체
const SUPABASE_URL      = 'https://byfxdwevmfocarvlnwla.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5Znhkd2V2bWZvY2Fydmxud2xhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NTQ2MjIsImV4cCI6MjA4OTMzMDYyMn0.uVKLAEBaudGcEw4nnZCSbSX0Tkjg8aVqurG4qclXpPc';

// Apify 비용 추정 (실행 1회당 약 $0.02 기준)
const COST_PER_RUN = 0.02;

let allPosts = [], allSnapshots = [];
let filterBrand = 'all', filterViral = false, sortMode = 'first_seen_at';

function fmt(n) {
  if (!n && n !== 0) return '—';
  if (n >= 1_000_000) return (n/1_000_000).toFixed(1)+'M';
  if (n >= 1_000) return (n/1_000).toFixed(1)+'K';
  return n.toLocaleString();
}
function relTime(iso) {
  if (!iso) return '—';
  const d = (Date.now() - new Date(iso))/1000;
  if (d < 60) return '방금 전';
  if (d < 3600) return Math.floor(d/60)+'분 전';
  if (d < 86400) return Math.floor(d/3600)+'시간 전';
  return Math.floor(d/86400)+'일 전';
}
function growthClass(r) {
  if (r >= 200) return 'hot';
  if (r >= 100) return 'warm';
  return 'cool';
}
function ringColor(r) {
  if (r >= 200) return '#E24B4A';
  if (r >= 100) return '#D97706';
  return '#0F9B7A';
}
function getLatestSnap(postId) {
  return allSnapshots.filter(s => s.post_id === postId).sort((a,b) => b.snapshot_seq - a.snapshot_seq)[0] || null;
}

function ring(growthRate, seq) {
  const pct = Math.min(growthRate/1000, 1);
  const r = 21, cx = 27, cy = 27, circ = 2*Math.PI*r;
  const filled = pct * circ;
  const color = ringColor(growthRate);
  const dots = Array.from({length:4},(_,i)=>`<div class="sdot ${i<seq?'done':''} ${i===seq-1?'active':''}"></div>`).join('');
  const label = growthRate >= 1000 ? '+'+Math.round(growthRate/100)/10+'K%' : '+'+Math.round(growthRate)+'%';
  return `
    <div class="sring">
      <svg width="54" height="54" viewBox="0 0 54 54">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="4"/>
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="4"
          stroke-dasharray="${filled.toFixed(1)} ${(circ-filled).toFixed(1)}" stroke-linecap="round"/>
      </svg>
      <div class="sring-val"><span class="sring-num" style="color:${color}">${label}</span></div>
    </div>
    <div class="sdots">${dots}</div>
    <div style="font-size:9px;color:var(--muted);text-align:center">${seq}번째 측정</div>`;
}

function cardHTML(post) {
  const snap = getLatestSnap(post.id);
  const growthRate = snap ? Math.max(snap.views_growth_rate, 0) : 0;
  const currentViews = snap ? snap.views : post.initial_views;
  const seq = snap ? snap.snapshot_seq : 1;
  const isViral = post.is_viral;

  return `
    <a class="rcard ${isViral?'viral':''}" href="${post.url}" target="_blank" rel="noopener">
      <div class="thumb">${post.thumbnail_url ? `<img src="${post.thumbnail_url}" alt="">` : '🎬'}</div>
      <div class="rbody">
        <div class="rhead">
          <span class="bbadge ${post.brand}">${post.brand==='meitu'?'메이투':'뷰티캠'}</span>
          ${isViral?'<span class="vtag">급상승</span>':'<span class="tracking-tag">추적 중</span>'}
          <span class="rtime">${relTime(post.first_seen_at)}</span>
        </div>
        <div class="rcap">${post.caption||'(캡션 없음)'}</div>
        <div class="rmets">
          <span class="met">👁 <b>${fmt(currentViews)}</b></span>
          <span class="met">❤ <b>${fmt(post.initial_likes)}</b></span>
          <span class="met">💬 <b>${fmt(post.initial_comments)}</b></span>
          ${growthRate>0?`<span class="gpill ${growthClass(growthRate)}">+${Math.round(growthRate)}%</span>`:''}
        </div>
      </div>
      <div class="scol">${ring(growthRate, seq)}</div>
    </a>`;
}

function getFiltered() {
  let list = [...allPosts];
  if (filterBrand !== 'all') list = list.filter(p => p.brand === filterBrand);
  if (filterViral) list = list.filter(p => p.is_viral);
  if (sortMode === 'growth') {
    list.sort((a,b) => {
      const sa = getLatestSnap(a.id), sb = getLatestSnap(b.id);
      return (sb?.views_growth_rate||0)-(sa?.views_growth_rate||0);
    });
  } else if (sortMode === 'views') {
    list.sort((a,b) => {
      const sa = getLatestSnap(a.id), sb = getLatestSnap(b.id);
      return (sb?.views||b.initial_views||0)-(sa?.views||a.initial_views||0);
    });
  } else {
    list.sort((a,b) => new Date(b.first_seen_at)-new Date(a.first_seen_at));
  }
  return list;
}

function renderFeed() {
  const feed = document.getElementById('feed');
  const posts = getFiltered();
  if (!posts.length) {
    feed.innerHTML = '<div class="empty-state"><div style="font-size:36px;margin-bottom:12px">📭</div><div>수집된 릴스가 없어요</div><div style="font-size:12px;margin-top:8px;color:var(--muted)">다음 크롤링 후 데이터가 쌓여요</div></div>';
    return;
  }
  feed.innerHTML = posts.map(cardHTML).join('');
}

function calcMonthlyCost(logs) {
  const now = new Date();
  const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
  const thisMonthLogs = logs.filter(l => new Date(l.ran_at) >= startOfMonth);
  const totalRuns = thisMonthLogs.length;
  const cost = (totalRuns * COST_PER_RUN).toFixed(2);
  document.getElementById('stat-cost').textContent = '$' + cost;
  document.getElementById('stat-runs').textContent = '실행 ' + totalRuns + '회';
}

async function loadData() {
  const feed = document.getElementById('feed');
  feed.innerHTML = Array(3).fill(`
    <div class="rcard" style="pointer-events:none">
      <div class="loading-skeleton" style="width:66px;height:66px;border-radius:8px;flex-shrink:0"></div>
      <div style="flex:1">
        <div class="loading-skeleton" style="height:13px;width:40%;margin-bottom:8px;border-radius:4px"></div>
        <div class="loading-skeleton" style="height:12px;width:85%;margin-bottom:5px;border-radius:4px"></div>
        <div class="loading-skeleton" style="height:12px;width:60%;border-radius:4px"></div>
      </div>
    </div>`).join('');

  try {
    const h = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` };
    const [pr, sr, ar, lr] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/posts?select=*&order=first_seen_at.desc&limit=100`, {headers:h}),
      fetch(`${SUPABASE_URL}/rest/v1/post_snapshots?select=*&order=snapshot_seq.desc`, {headers:h}),
      fetch(`${SUPABASE_URL}/rest/v1/viral_alerts?select=*&order=alerted_at.desc&limit=10`, {headers:h}),
      fetch(`${SUPABASE_URL}/rest/v1/crawl_logs?select=*&order=ran_at.desc&limit=50`, {headers:h}),
    ]);

    allPosts     = await pr.json();
    allSnapshots = await sr.json();
    const alerts = await ar.json();
    const logs   = await lr.json();

    document.getElementById('stat-viral').textContent    = allPosts.filter(p=>p.is_viral).length;
    document.getElementById('stat-tracking').textContent = allPosts.filter(p=>!p.is_viral).length;
    document.getElementById('stat-meitu').textContent    = allPosts.filter(p=>p.brand==='meitu').length;
    document.getElementById('stat-bcam').textContent     = allPosts.filter(p=>p.brand==='beautycam').length;
    document.getElementById('last-update').textContent   = '갱신: ' + new Date().toLocaleTimeString('ko-KR');

    calcMonthlyCost(logs);

    document.getElementById('alerts-list').innerHTML = !alerts.length
      ? '<div style="font-size:12px;color:var(--muted)">알림 없음</div>'
      : alerts.map(a=>`
        <div class="alert-item">
          <div class="adot" style="background:${a.brand==='meitu'?'var(--meitu)':'var(--beautycam)'}"></div>
          <div>
            <div class="abrand" style="color:${a.brand==='meitu'?'var(--meitu)':'var(--beautycam)'}">${a.brand==='meitu'?'메이투':'뷰티캠'}</div>
            <div class="agrowth" style="color:var(--amber)">+${Math.round(a.views_growth_rate)}%</div>
            <div class="atime">${relTime(a.alerted_at)} · 슬랙 발송</div>
          </div>
        </div>`).join('');

    const recentLogs = logs.slice(0,8);
    document.getElementById('crawl-log').innerHTML = !recentLogs.length
      ? '<div style="font-size:12px;color:var(--muted)">로그 없음</div>'
      : recentLogs.map(l=>`
        <div class="log-row">
          <span><span class="ldot ${l.status}"></span>${l.brand==='meitu'?'메이투':'뷰티캠'} <span style="color:var(--muted)">${l.posts_found||0}개</span></span>
          <span style="color:var(--muted);font-size:11px">${relTime(l.ran_at)}</span>
        </div>`).join('');

    renderFeed();
  } catch(e) {
    feed.innerHTML = `<div class="empty-state"><div style="font-size:36px;margin-bottom:12px">⚠️</div><div>데이터 로드 실패</div><div style="font-size:12px;margin-top:8px;color:var(--muted)">${e.message}</div></div>`;
  }
}

function setFilter(brand, el) {
  filterBrand = brand;
  document.querySelectorAll('.chip:not(#viral-chip)').forEach(c=>c.classList.remove('on','on-b'));
  el.classList.add(brand==='beautycam'?'on-b':'on');
  renderFeed();
}
function toggleViral(el) {
  filterViral = !filterViral;
  el.classList.toggle('on-v', filterViral);
  renderFeed();
}
function setSort(v) { sortMode = v; renderFeed(); }

loadData();
setInterval(loadData, 5*60*1000);
</script>


</body></html>
